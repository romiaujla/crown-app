name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pr_title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR title
        run: node scripts/validate-pr-title.mjs "${{ github.event.pull_request.title }}"

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Backend tests
        run: pnpm --filter @crown/api test

      - name: Install Playwright browsers
        run: pnpm --filter @crown/web exec playwright install --with-deps chromium

      - name: Frontend Playwright smoke
        run: pnpm --filter @crown/web test:smoke

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
            apps/api/coverage
          if-no-files-found: ignore
